<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="固定収入から、貯金・住居費・食費・娯楽費の目安を即時表示する支出管理アプリ。">
    <title>Wealth Check | Quant Log</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Wealth Check</p>
        <h1>収入を入れる。配分を見る。</h1>
        <p class="lede">貯金20%、住居費25%、食費15%、娯楽費10%。固定収入から使える目安を一画面で確認します。</p>
      </section>

      <section class="calculator">
        <label for="income" class="form-label">固定収入</label>
        <div class="input-row">
          <input
            id="income"
            name="income"
            type="number"
            min="0"
            step="1000"
            placeholder="例: 300000"
            aria-describedby="income-note"
          >
          <button id="calculateBtn" type="button">計算</button>
        </div>
        <p id="income-note" class="note">金額を入力すると、下に配分の目安が表示されます。</p>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section id="resultPanel" class="results hidden">
        <p class="result-title">配分目安</p>
        <div class="result-grid">
          <article class="result-card">
            <p class="result-label">貯金</p>
            <p class="result-amount" data-target="savings">0円</p>
            <p class="result-sub">20%</p>
          </article>
          <article class="result-card">
            <p class="result-label">住居費</p>
            <p class="result-amount" data-target="housing">0円</p>
            <p class="result-sub">25%</p>
          </article>
          <article class="result-card">
            <p class="result-label">食費</p>
            <p class="result-amount" data-target="food">0円</p>
            <p class="result-sub">15%</p>
          </article>
          <article class="result-card">
            <p class="result-label">娯楽費</p>
            <p class="result-amount" data-target="entertainment">0円</p>
            <p class="result-sub">10%</p>
          </article>
        </div>
        <div class="summary-row">
          <div>
            <p class="summary-label">配分合計</p>
            <p class="summary-value" id="totalAllocated">0円</p>
            <p class="summary-note">70%</p>
          </div>
          <div>
            <p class="summary-label">自由枠</p>
            <p class="summary-value" id="remainingMoney">0円</p>
            <p class="summary-note">30%</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const formatCurrency = (value) =>
        new Intl.NumberFormat("ja-JP", {
          style: "currency",
          currency: "JPY",
          maximumFractionDigits: 0,
        }).format(value);

      const categories = [
        { id: "savings", ratio: 0.2 },
        { id: "housing", ratio: 0.25 },
        { id: "food", ratio: 0.15 },
        { id: "entertainment", ratio: 0.1 },
      ];

      const resultPanel = document.getElementById("resultPanel");
      const messageEl = document.getElementById("message");

      const renderResults = (income) => {
        let allocated = 0;
        categories.forEach((category) => {
          const amount = Math.round(income * category.ratio);
          allocated += amount;
          const targetEl = document.querySelector(`[data-target="${category.id}"]`);
          if (targetEl) targetEl.textContent = formatCurrency(amount);
        });

        document.getElementById("totalAllocated").textContent = formatCurrency(allocated);
        document.getElementById("remainingMoney").textContent = formatCurrency(Math.max(0, income - allocated));
        resultPanel.classList.remove("hidden");
      };

      const handleCalculation = () => {
        const rawIncome = document.getElementById("income").value;
        const income = Number(rawIncome);
        if (!rawIncome || Number.isNaN(income) || income <= 0) {
          messageEl.textContent = "1円以上の金額を入力してください。";
          resultPanel.classList.add("hidden");
          return;
        }
        messageEl.textContent = "";
        renderResults(income);
      };

      document.getElementById("calculateBtn").addEventListener("click", handleCalculation);
    </script>
  </body>
</html>
